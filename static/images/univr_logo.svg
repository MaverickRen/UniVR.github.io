<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F7931E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer eye shape -->
  <ellipse cx="50" cy="50" rx="42" ry="28" fill="none" stroke="url(#grad1)" stroke-width="3.5"/>
  <!-- Inner iris -->
  <circle cx="50" cy="50" r="16" fill="none" stroke="url(#grad2)" stroke-width="3"/>
  <!-- Pupil with brain-like pattern -->
  <circle cx="50" cy="50" r="8" fill="url(#grad1)"/>
  <!-- Neural network dots -->
  <circle cx="30" cy="38" r="2.5" fill="url(#grad2)" opacity="0.8"/>
  <circle cx="70" cy="38" r="2.5" fill="url(#grad2)" opacity="0.8"/>
  <circle cx="30" cy="62" r="2.5" fill="url(#grad2)" opacity="0.8"/>
  <circle cx="70" cy="62" r="2.5" fill="url(#grad2)" opacity="0.8"/>
  <!-- Connection lines -->
  <line x1="32" y1="39" x2="42" y2="47" stroke="url(#grad2)" stroke-width="1.2" opacity="0.5"/>
  <line x1="68" y1="39" x2="58" y2="47" stroke="url(#grad2)" stroke-width="1.2" opacity="0.5"/>
  <line x1="32" y1="61" x2="42" y2="53" stroke="url(#grad2)" stroke-width="1.2" opacity="0.5"/>
  <line x1="68" y1="61" x2="58" y2="53" stroke="url(#grad2)" stroke-width="1.2" opacity="0.5"/>
  <!-- Sparkle accents -->
  <circle cx="15" cy="50" r="1.5" fill="#FFD700" opacity="0.6"/>
  <circle cx="85" cy="50" r="1.5" fill="#FFD700" opacity="0.6"/>
</svg>
